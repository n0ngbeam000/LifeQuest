<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — LifeQuest</title>

  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --accent: #eab308;
      --accent-glow: rgba(234, 179, 8, 0.25);
      --text: #f8fafc;
      --muted: #94a3b8;
      --success: #4ade80;
      --error: #f87171;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .auth-wrapper {
      width: 100%;
      max-width: 420px;
    }

    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.4);
    }

    .icon-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 1.25rem;
    }

    .icon-wrap i {
      font-size: 2.5rem;
      color: var(--accent);
      filter: drop-shadow(0 0 8px var(--accent-glow));
    }

    .auth-title {
      font-family: 'VT323', monospace;
      font-size: 2.4rem;
      letter-spacing: 3px;
      text-align: center;
      color: var(--accent);
      text-shadow: 0 0 12px var(--accent-glow);
      margin-bottom: 0.25rem;
    }

    .auth-subtitle {
      text-align: center;
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 1.75rem;
    }

    /* Messages */
    .alert {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
      border-left: 3px solid transparent;
    }
    .alert-success {
      background: rgba(74, 222, 128, 0.1);
      border-color: var(--success);
      color: var(--success);
    }
    .alert-error {
      background: rgba(248, 113, 113, 0.1);
      border-color: var(--error);
      color: var(--error);
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }

    .form-input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .form-input::placeholder { color: var(--muted); }

    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .btn-submit {
      width: 100%;
      padding: 0.85rem;
      background: var(--accent);
      color: #0f172a;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s, box-shadow 0.2s;
    }

    .btn-submit:hover {
      opacity: 0.9;
      box-shadow: 0 0 16px var(--accent-glow);
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.85rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="icon-wrap">
        <i class="fa-solid fa-key"></i>
      </div>

      <h1 class="auth-title">LIFEQUEST</h1>
      <p class="auth-subtitle">Enter your email to receive a reset link</p>

      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <form method="POST" novalidate>
        {% csrf_token %}

        <div class="form-group">
          <label class="form-label" for="id_email">
            <i class="fa-solid fa-envelope" style="margin-right:6px;"></i>Email Address
          </label>
          <input
            class="form-input"
            type="email"
            id="id_email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          >
        </div>

        <button type="submit" class="btn-submit">
          <i class="fa-solid fa-paper-plane" style="margin-right:8px;"></i>SEND RESET LINK
        </button>
      </form>

      <a href="{% url 'login' %}" class="back-link">
        ← Back to login
      </a>

    </div>
  </div>
</body>
</html>
