<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — LifeQuest</title>

  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --accent: #eab308;
      --accent-glow: rgba(234, 179, 8, 0.25);
      --text: #f8fafc;
      --muted: #94a3b8;
      --success: #4ade80;
      --error: #f87171;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .auth-wrapper {
      width: 100%;
      max-width: 420px;
    }

    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.4);
    }

    .icon-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 1.25rem;
    }

    .icon-wrap i {
      font-size: 2.5rem;
      color: var(--accent);
      filter: drop-shadow(0 0 8px var(--accent-glow));
    }

    .auth-title {
      font-family: 'VT323', monospace;
      font-size: 2.4rem;
      letter-spacing: 3px;
      text-align: center;
      color: var(--accent);
      text-shadow: 0 0 12px var(--accent-glow);
      margin-bottom: 0.25rem;
    }

    .auth-subtitle {
      text-align: center;
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 1.75rem;
    }

    /* Messages */
    .alert {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
      border-left: 3px solid transparent;
    }
    .alert-success {
      background: rgba(74, 222, 128, 0.1);
      border-color: var(--success);
      color: var(--success);
    }
    .alert-error {
      background: rgba(248, 113, 113, 0.1);
      border-color: var(--error);
      color: var(--error);
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }

    .input-wrapper {
      position: relative;
    }

    .form-input {
      width: 100%;
      padding: 0.75rem 2.75rem 0.75rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .form-input::placeholder { color: var(--muted); }

    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .pw-toggle {
      position: absolute;
      top: 50%;
      right: 0.875rem;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      padding: 0;
      transition: color 0.2s;
    }

    .pw-toggle:hover { color: var(--accent); }

    /* Strength meter */
    .strength-wrap {
      margin-top: 0.5rem;
    }

    .strength-bar-track {
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .strength-bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 4px;
      transition: width 0.3s ease, background 0.3s ease;
    }

    .strength-label {
      font-size: 0.75rem;
      margin-top: 0.35rem;
      color: var(--muted);
      transition: color 0.3s;
    }

    .btn-submit {
      width: 100%;
      padding: 0.85rem;
      background: var(--accent);
      color: #0f172a;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s, box-shadow 0.2s;
    }

    .btn-submit:hover {
      opacity: 0.9;
      box-shadow: 0 0 16px var(--accent-glow);
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.85rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="icon-wrap">
        <i class="fa-solid fa-shield-halved"></i>
      </div>

      <h1 class="auth-title">LIFEQUEST</h1>
      <p class="auth-subtitle">Choose a new password for your account</p>

      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <form method="POST" action="{% url 'reset_password' uidb64=uidb64 token=token %}" novalidate>
        {% csrf_token %}

        <!-- New Password -->
        <div class="form-group">
          <label class="form-label" for="id_password1">
            <i class="fa-solid fa-lock" style="margin-right:6px;"></i>New Password
          </label>
          <div class="input-wrapper">
            <input
              class="form-input"
              type="password"
              id="id_password1"
              name="password1"
              placeholder="Min. 8 characters"
              autocomplete="new-password"
              required
            >
            <button type="button" class="pw-toggle" aria-label="Show password" data-target="id_password1">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>

          <!-- Strength meter -->
          <div class="strength-wrap">
            <div class="strength-bar-track">
              <div class="strength-bar-fill" id="strength-fill"></div>
            </div>
            <p class="strength-label" id="strength-label">Enter a password</p>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label class="form-label" for="id_password2">
            <i class="fa-solid fa-lock" style="margin-right:6px;"></i>Confirm Password
          </label>
          <div class="input-wrapper">
            <input
              class="form-input"
              type="password"
              id="id_password2"
              name="password2"
              placeholder="Re-enter your password"
              autocomplete="new-password"
              required
            >
            <button type="button" class="pw-toggle" aria-label="Show confirm password" data-target="id_password2">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-submit">
          <i class="fa-solid fa-floppy-disk" style="margin-right:8px;"></i>SET NEW PASSWORD
        </button>
      </form>

      <a href="{% url 'login' %}" class="back-link">
        ← Back to login
      </a>

    </div>
  </div>

  <script>
    // --- Password visibility toggle ---
    document.querySelectorAll('.pw-toggle').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var inputId = btn.getAttribute('data-target');
        var input = document.getElementById(inputId);
        var icon = btn.querySelector('i');
        if (input.type === 'password') {
          input.type = 'text';
          icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
          input.type = 'password';
          icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
      });
    });

    // --- Password strength meter ---
    var pwInput    = document.getElementById('id_password1');
    var fillBar    = document.getElementById('strength-fill');
    var strengthLbl = document.getElementById('strength-label');

    var levels = [
      { label: 'Too short',  color: '#f87171', pct: '10%' },
      { label: 'Weak',       color: '#f87171', pct: '25%' },
      { label: 'Fair',       color: '#fb923c', pct: '50%' },
      { label: 'Good',       color: '#facc15', pct: '75%' },
      { label: 'Strong',     color: '#4ade80', pct: '100%' },
    ];

    pwInput.addEventListener('input', function() {
      var val = pwInput.value;
      if (!val) {
        fillBar.style.width = '0%';
        strengthLbl.textContent = 'Enter a password';
        strengthLbl.style.color = 'var(--muted)';
        return;
      }
      var score = 0;
      if (val.length >= 8)                    score++;
      if (/[A-Z]/.test(val))                  score++;
      if (/[0-9]/.test(val))                  score++;
      if (/[^A-Za-z0-9]/.test(val))           score++;

      var level = (val.length < 8) ? 0 : Math.min(score, 4);
      var info  = levels[level];
      fillBar.style.width      = info.pct;
      fillBar.style.background = info.color;
      strengthLbl.textContent  = info.label;
      strengthLbl.style.color  = info.color;
    });
  </script>
</body>
</html>
