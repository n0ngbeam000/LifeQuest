<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Life Quest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #1a1a2e;
            color: white;
            font-family: 'VT323', monospace;
            padding-top: 50px;
            min-height: 100vh;
        }
        .user-info {
            background-color: #2e026d;
            border: 2px solid #f9ca24;
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            text-align: center;
        }
        .username {
            color: #f9ca24;
            font-size: 2rem;
            font-weight: bold;
        }
        .btn-logout {
            background-color: #d32f2f;
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: 0.3s;
        }
        .btn-logout:hover {
            background-color: #b71c1c;
            color: white;
        }
    </style>
</head>
<body>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        <div class="user-info">
            <h1 class="display-1 text-warning">🎮 LIFE QUEST 🎮</h1>
            <p class="lead mt-3">Welcome, <span class="username">{{ user.username }}</span></p>
        </div>

        <div style="text-align: center;">
            <h2>🏰 Main Hub</h2>
            <p class="text-white-50 mb-4">This is your starting point. More features coming soon!</p>
            
            <a href="#" class="btn btn-outline-warning btn-lg me-2" style="cursor: not-allowed; opacity: 0.6;">📜 View Quests (Soon)</a>
            <a href="#" class="btn btn-outline-info btn-lg me-2" style="cursor: not-allowed; opacity: 0.6;">📊 Statistics (Soon)</a>
            <a href="#" class="btn btn-outline-success btn-lg" style="cursor: not-allowed; opacity: 0.6;">⚙️ Settings (Soon)</a>
        </div>

        <div style="text-align: center; margin-top: 3rem;">
            <form method="POST" action="{% url 'logout' %}" style="display: inline;">
                {% csrf_token %}
                <button type="submit" class="btn-logout" style="border: none; cursor: pointer;">← Logout</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
