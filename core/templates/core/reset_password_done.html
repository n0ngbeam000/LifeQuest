<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Updated — LifeQuest</title>

  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --accent: #eab308;
      --accent-glow: rgba(234, 179, 8, 0.25);
      --text: #f8fafc;
      --muted: #94a3b8;
      --success: #4ade80;
      --error: #f87171;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .auth-wrapper {
      width: 100%;
      max-width: 420px;
    }

    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem 2rem;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.4);
      text-align: center;
    }

    .checkmark-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(74, 222, 128, 0.12);
      border: 2px solid var(--success);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      box-shadow: 0 0 20px rgba(74, 222, 128, 0.2);
    }

    .checkmark-circle i {
      font-size: 2.2rem;
      color: var(--success);
    }

    .auth-title {
      font-family: 'VT323', monospace;
      font-size: 2.4rem;
      letter-spacing: 3px;
      color: var(--accent);
      text-shadow: 0 0 12px var(--accent-glow);
      margin-bottom: 0.5rem;
    }

    .success-heading {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.75rem;
    }

    .success-desc {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .btn-login {
      display: inline-block;
      padding: 0.85rem 2rem;
      background: var(--accent);
      color: #0f172a;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      border: none;
      border-radius: 8px;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.2s, box-shadow 0.2s;
    }

    .btn-login:hover {
      opacity: 0.9;
      box-shadow: 0 0 16px var(--accent-glow);
    }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="checkmark-circle">
        <i class="fa-solid fa-check"></i>
      </div>

      <h1 class="auth-title">LIFEQUEST</h1>

      <h2 class="success-heading">Password Updated!</h2>
      <p class="success-desc">
        Your password has been updated successfully.<br>
        You can now log in with your new password.
      </p>

      <a href="{% url 'login' %}" class="btn-login">
        <i class="fa-solid fa-right-to-bracket" style="margin-right:8px;"></i>BACK TO LOGIN
      </a>

    </div>
  </div>
</body>
</html>
