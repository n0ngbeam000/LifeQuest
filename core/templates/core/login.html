{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — LifeQuest</title>

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Auth CSS -->
  <link rel="stylesheet" href="{% static 'core/css/auth.css' %}">
</head>

<body class="auth-page">

  <!-- Animated Particle Canvas -->
  <canvas id="particles-canvas" aria-hidden="true"></canvas>

  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Floating Sparkles -->
      <div class="sparkles-wrap" aria-hidden="true">
        <span class="sparkle" style="left:8%;  top:30%; --dur:3.8s; --delay:0s;">✨</span>
        <span class="sparkle" style="left:88%; top:18%; --dur:4.5s; --delay:0.7s;">✨</span>
        <span class="sparkle" style="left:20%; top:78%; --dur:5.0s; --delay:1.2s;">⭐</span>
        <span class="sparkle" style="left:76%; top:65%; --dur:3.2s; --delay:2.0s;">✨</span>
        <span class="sparkle" style="left:50%; top:10%; --dur:4.0s; --delay:0.4s;">⭐</span>
        <span class="sparkle" style="left:35%; top:88%; --dur:5.5s; --delay:1.8s;">✨</span>
      </div>

      <!-- Controller Icon -->
      <div class="controller-icon" aria-hidden="true">
        <i class="fa-solid fa-gamepad"></i>
      </div>

      <!-- Title -->
      <h1 class="auth-title">LOGIN</h1>
      <p class="auth-subtitle">Continue your adventure ✦</p>

      <!-- Django Messages -->
      {% if messages %}
        {% for message in messages %}
          <div class="auth-alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <!-- Login Form -->
      <form method="POST" class="auth-form" novalidate>
        {% csrf_token %}

        <!-- Username -->
        <div class="form-group">
          <label class="form-label" for="id_username">
            <i class="fa-solid fa-user" style="margin-right:6px;"></i>Username
          </label>
          <div class="input-wrapper">
            <input
              class="form-input"
              type="text"
              id="id_username"
              name="username"
              placeholder="Enter your username"
              autocomplete="username"
              required
            >
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="id_password">
            <i class="fa-solid fa-lock" style="margin-right:6px;"></i>Password
          </label>
          <div class="input-wrapper has-toggle">
            <input
              class="form-input"
              type="password"
              id="id_password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            >
            <button type="button" class="pw-toggle" aria-label="Show password">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-quest">
          ⚔ ENTER THE QUEST ⚔
        </button>
      </form>

      <div class="auth-divider">or</div>

      <p class="auth-footer">
        Haven't got an account?
        <a href="{% url 'register' %}" class="auth-link">Create an account</a>
      </p>

    </div><!-- .auth-card -->
  </div><!-- .auth-wrapper -->

  <script src="{% static 'core/js/auth.js' %}"></script>
</body>
</html>
