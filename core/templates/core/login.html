{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Life Quest</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
</head>
<body>

    <div class="game-card">
        <img src="{% static 'core/images/LogoLifeQuest.png' %}" alt="Life Quest Logo" style="max-width: 100px; margin-bottom: 10px;">
        <h1 class="text-warning">LOGIN</h1>
        <p class="text-white-50 mb-4">Continue your adventure</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div>
                <label>Username</label>
                {{ form.username }} 
            </div>

            <div>
                <label>Password</label>
                {{ form.password }}
            </div>

            <button type="submit" class="btn btn-start">ENTER THE QUEST</button>
        </form>

        <p class="mt-3 text-white-50">
            Haven’t got an account? <a href="{% url 'register' %}" class="text-warning">Create an account</a>
        </p>
    </div>

    <script src="{% static 'core/js/form.js' %}"></script>
</body>
</html>
